name: gRPC API tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'

      - name: Download Go modules
        run: go mod download

      - name: Install latest golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...

      - name: Start services
        run: docker compose --env-file tests/.env -f docker-compose.test.yml up --build -d

      - name: Run Go tests
        run: |
            export $(grep -v '^#' tests/.env | xargs)
            go test -v ./...

      - name: Stop services
        if: always()
        run: docker compose --env-file tests/.env -f docker-compose.test.yml down
